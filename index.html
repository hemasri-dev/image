<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level 3 Task 1 - Image Manipulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1><b>Image Gallery</b></h1>

<!-- Image Gallery -->
<div class="gallery">
    <input type="radio" name="gallery" id="img1" checked>
    <input type="radio" name="gallery" id="img2">
    <input type="radio" name="gallery" id="img3">
    <input type="radio" name="gallery" id="img8">


    <div class="main-image">
        <img src="./images/img1.jpg" class="image img1">
        <img src="./images/img2.jpg" class="image img2">
        <img src="./images/img3.jpg" class="image img3">
        <img src="./images/img8.jpg" class="image img8">
    </div>

    <div class="thumbnails">
        <label for="img1">
            <!-- <img src="https://picsum.photos/id/1015/150/80"> -->
             <img src="./images/img1.jpg" >
        </label>
        <label for="img2">
            <!-- <img src="https://picsum.photos/id/1016/150/80"> -->
             <img src="./images/img2.jpg" alt="">
        </label>
        <label for="img3">
            <!-- <img src="https://picsum.photos/id/1018/150/80"> -->
             <img src="./images/img3.jpg" alt="">
        </label>
         <label for="img8">
            <!-- <img src="https://picsum.photos/id/1018/150/80"> -->
             <img src="./images/img8.jpg" alt="">
        </label>
    </div>
</div>

<h1><b>Automatic Slideshow</b></h1>

<div class="slideshow">
    <div class="slides">
        <!-- <img src="https://picsum.photos/id/1025/800/400">
        <img src="https://picsum.photos/id/1035/800/400">
        <img src="https://picsum.photos/id/1043/800/400">
        <img src="https://picsum.photos/id/1025/800/400">
        <img src="https://picsum.photos/id/1035/800/400">
        <img src="https://picsum.photos/id/1043/800/400"> -->
        <img src="./images/img4.jpg" alt="">
        <img src="./images/img5.jpg" alt="">
        <img src="./images/img6.jpg" alt="">
        <img src="./images/img7.jpg" alt="">
    </div>
</div>
</body>
</html>
